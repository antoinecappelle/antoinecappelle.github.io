<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>fourmi's Pong</title>
    <script src="socket.io.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Menus */
        .menu-container { text-align: center; display: flex; flex-direction: column; gap: 15px; }
        h1 { font-size: 50px; color: #5865F2; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 5px; background: #5865F2; color: white; transition: 0.2s; }
        button:hover { background: #4752c4; transform: scale(1.05); }
        .btn-easy { background: #43b581; }
        .btn-hard { background: #f04747; }
        
        /* Jeu */
        canvas { border: 4px solid #5865F2; background: #000; border-radius: 8px; display: none; }
        #status { font-size: 20px; color: #faa61a; margin-top: 20px; display: none; }
        #scoreBoard { display: none; font-size: 48px; margin-bottom: 10px; font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="mainMenu" class="menu-container">
        <h1>PONG MULTI</h1>
        <button onclick="showDifficulty()">MODE SOLO</button>
        <button onclick="startMulti()">MULTIJOUEUR</button>
    </div>

    <div id="difficultyMenu" class="menu-container hidden">
        <h1>DIFFICULTÉ</h1>
        <button class="btn-easy" onclick="startSolo(0.05)">FACILE</button>
        <button onclick="startSolo(0.08)">NORMAL</button>
        <button class="btn-hard" onclick="startSolo(0.15)">EXPERT</button>
        <button style="background:gray; margin-top:10px;" onclick="backToMenu()">RETOUR</button>
    </div>

    <div id="status">Connexion...</div>
    <div id="scoreBoard">0 | 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const mainMenu = document.getElementById("mainMenu");
        const diffMenu = document.getElementById("difficultyMenu");
        const statusDiv = document.getElementById("status");
        const scoreBoard = document.getElementById("scoreBoard");

        let socket;
        let mode = null; // 'solo' ou 'multi'
        let myRole = 'left'; 
        let user = { y: 160, score: 0 };
        let opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, vX: 5, vY: 5 };
        let gameActive = false;
        let cpuSpeed = 0.08;

        // --- NAVIGATION ---
        function showDifficulty() {
            mainMenu.classList.add("hidden");
            diffMenu.classList.remove("hidden");
        }

        function backToMenu() {
            location.reload(); // Plus simple pour reset tous les états
        }

        // --- LOGIQUE SOLO ---
        function startSolo(difficulty) {
            mode = 'solo';
            cpuSpeed = difficulty;
            diffMenu.classList.add("hidden");
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            gameActive = true;
            loop();
        }

        // --- LOGIQUE MULTI ---
        function startMulti() {
            mode = 'multi';
            mainMenu.classList.add("hidden");
            statusDiv.style.display = "block";
            statusDiv.innerText = "Connexion au serveur...";

            socket = io({ path: '/mon-serveur/socket.io', transports: ['websocket'] });

            socket.on('role', (role) => {
                myRole = role;
                statusDiv.innerText = "Attente d'un adversaire...";
            });

            socket.on('playerJoined', () => {
                statusDiv.style.display = "none";
                canvas.style.display = "block";
                scoreBoard.style.display = "block";
                gameActive = true;
                loop();
            });

            socket.on('opponentMove', (y) => { opponent.y = y; });
            socket.on('ballUpdate', (data) => {
                if(myRole === 'right') {
                    ball.x = data.x; ball.y = data.y;
                    user.score = data.scoreRight; opponent.score = data.scoreLeft;
                }
            });

            socket.on('opponentLeft', (msg) => {
                gameActive = false;
                alert(msg);
                location.reload();
            });
        }

        // --- BOUCLE DE JEU ---
        canvas.addEventListener("mousemove", e => {
            if(!gameActive) return;
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - 40;
            if(mode === 'multi') socket.emit('move', user.y);
        });

        function update() {
            if (mode === 'solo') {
                // Mouvement Balle
                ball.x += ball.vX; ball.y += ball.vY;
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;

                // IA (Opponent)
                let targetY = ball.y - 40;
                opponent.y += (targetY - opponent.y) * cpuSpeed;

                // Collisions
                if(ball.x < 30 && ball.x > 10 && ball.y > user.y - 5 && ball.y < user.y + 85) ball.vX = Math.abs(ball.vX) * 1.05;
                if(ball.x > 760 && ball.x < 785 && ball.y > opponent.y - 5 && ball.y < opponent.y + 85) ball.vX = -Math.abs(ball.vX) * 1.05;

                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }
            } 
            else if (mode === 'multi' && myRole === 'left') {
                ball.x += ball.vX; ball.y += ball.vY;
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;
                if(ball.x < 30 && ball.x > 10 && ball.y > user.y - 5 && ball.y < user.y + 85) { ball.vX = Math.abs(ball.vX) * 1.05; ball.x = 31; }
                if(ball.x > 760 && ball.x < 785 && ball.y > opponent.y - 5 && ball.y < opponent.y + 85) { ball.vX = -Math.abs(ball.vX) * 1.05; ball.x = 759; }
                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }
                socket.emit('ballSync', { x: ball.x, y: ball.y, scoreLeft: user.score, scoreRight: opponent.score });
            }
            scoreBoard.innerText = (myRole === 'left') ? `${user.score} | ${opponent.score}` : `${opponent.score} | ${user.score}`;
        }

        function resetBall() {
            ball.x = 400; ball.y = 200;
            ball.vX = (Math.random() > 0.5 ? 5 : -5);
            ball.vY = (Math.random() > 0.5 ? 4 : -4);
        }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#ffffff11"; ctx.fillRect(399, 0, 2, 400);
            ctx.fillStyle = "#5865F2";
            ctx.fillRect((myRole === 'left' ? 10 : 780), user.y, 10, 80);
            ctx.fillStyle = "#ED4245";
            ctx.fillRect((myRole === 'left' ? 780 : 10), opponent.y, 10, 80);
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        }

        function loop() {
            if(!gameActive) return;
            update(); render();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
