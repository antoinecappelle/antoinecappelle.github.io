<!DOCTYPE html>
<html>
<head>
    <title>Discord Pong Multi</title>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; }
        canvas { border: 4px solid #5865F2; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; }
        .score { font-size: 48px; margin-bottom: 10px; font-weight: bold; letter-spacing: 10px; }
    </style>
</head>
<body>
    <div class="score" id="scoreBoard">00 | 00</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");

        // Configuration
        const paddleWidth = 10, paddleHeight = 80;
        let user = { x: 10, y: canvas.height/2 - 40, score: 0, color: "#5865F2" };
        let com = { x: canvas.width - 20, y: canvas.height/2 - 40, score: 0, color: "#ED4245" };
        let ball = { x: canvas.width/2, y: canvas.height/2, radius: 8, speed: 7, vX: 5, vY: 5 };

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fill();
        }

        function drawNet() {
            for(let i=0; i<=canvas.height; i+=40) {
                drawRect(canvas.width/2 - 1, i, 2, 20, "#ffffff33");
            }
        }

        canvas.addEventListener("mousemove", e => {
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - paddleHeight/2;
        });

        function resetBall() {
            ball.x = canvas.width/2;
            ball.y = canvas.height/2;
            ball.speed = 7;
            ball.vX = -ball.vX;
        }

        function update() {
            ball.x += ball.vX;
            ball.y += ball.vY;

            // IA (A remplacer par le joueur 2 en réseau plus tard)
            com.y += (ball.y - (com.y + paddleHeight/2)) * 0.12;

            if(ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) ball.vY = -ball.vY;

            let player = (ball.x < canvas.width/2) ? user : com;
            if(collision(ball, player)) {
                let collidePoint = (ball.y - (player.y + paddleHeight/2)) / (paddleHeight/2);
                let angleRad = (Math.PI/4) * collidePoint;
                let direction = (ball.x < canvas.width/2) ? 1 : -1;
                ball.vX = direction * ball.speed * Math.cos(angleRad);
                ball.vY = ball.speed * Math.sin(angleRad);
                ball.speed += 0.3;
            }

            if(ball.x - ball.radius < 0) {
                com.score++;
                updateScore();
                resetBall();
            } else if(ball.x + ball.radius > canvas.width) {
                user.score++;
                updateScore();
                resetBall();
            }
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && b.x - b.radius < p.x + paddleWidth && b.y + b.radius > p.y && b.y - b.radius < p.y + paddleHeight;
        }

        function updateScore() {
            scoreBoard.innerHTML = `${user.score.toString().padStart(2, '0')} | ${com.score.toString().padStart(2, '0')}`;
        }

        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#000");
            drawNet();
            drawRect(user.x, user.y, paddleWidth, paddleHeight, user.color);
            drawRect(com.x, com.y, paddleWidth, paddleHeight, com.color);
            drawCircle(ball.x, ball.y, ball.radius, "#fff");
        }

        function game() { update(); render(); }
        setInterval(game, 1000/60);
    </script>
</body>
</html>
