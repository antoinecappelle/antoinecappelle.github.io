<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discord Pong Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #5865F2; background: #000; border-radius: 8px; display: none; }
        #status { font-size: 20px; margin-bottom: 20px; color: #faa61a; text-align: center; }
        #scoreBoard { display: none; font-size: 48px; margin-bottom: 10px; font-family: monospace; }
        .loading-dots:after { content: '.'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>
    <div id="status">Connexion au serveur Render (Réveil en cours)<span class="loading-dots"></span></div>
    <div id="scoreBoard">00 | 00</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        // Utilisation de ton lien Render
        const socket = io("https://pong-server-idzu.onrender.com");
        
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const scoreBoard = document.getElementById("scoreBoard");

        let myRole = null; // 'left' ou 'right'
        let user = { y: 160, score: 0 };
        let opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, radius: 8, vX: 5, vY: 5 };

        // Gestion de la connexion
        socket.on('connect', () => {
            statusDiv.innerText = "Recherche d'un adversaire...";
            statusDiv.style.color = "#43b581";
        });

        socket.on('role', (role) => {
            myRole = role;
            statusDiv.innerText = "Joueur " + (role === 'left' ? "GAUCHE" : "DROITE") + " connecté !";
            // On affiche le jeu dès qu'on a un rôle
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            loop();
        });

        socket.on('error', (msg) => {
            statusDiv.innerText = msg;
            statusDiv.style.color = "#f04747";
        });

        // Synchronisation des mouvements
        socket.on('opponentMove', (y) => {
            opponent.y = y;
        });

        // Synchronisation de la balle (reçue du serveur ou du joueur gauche)
        socket.on('ballUpdate', (ballData) => {
            if (myRole === 'right') {
                ball = ballData;
            }
        });

        // Envoi du mouvement de la souris
        canvas.addEventListener("mousemove", e => {
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - 40;
            socket.emit('move', user.y);
        });

        function update() {
            if (!myRole) return;

            // Seul le joueur GAUCHE calcule la physique de la balle
            if (myRole === 'left') {
                ball.x += ball.vX;
                ball.y += ball.vY;

                // Rebond haut/bas
                if(ball.y < 0 || ball.y > 400) ball.vY = -ball.vY;

                // Rebond Raquette Gauche (Nous)
                if(ball.x < 20 && ball.y > user.y && ball.y < user.y + 80) {
                    ball.vX = Math.abs(ball.vX) * 1.1; // Accélère un peu
                }
                // Rebond Raquette Droite (Adversaire)
                if(ball.x > 780 && ball.y > opponent.y && ball.y < opponent.y + 80) {
                    ball.vX = -Math.abs(ball.vX) * 1.1;
                }

                // Points et Reset
                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }

                // Envoi de la balle à l'autre joueur
                socket.emit('ballSync', ball);
            }
            
            // Mise à jour visuelle du score
            if (myRole === 'left') {
                scoreBoard.innerHTML = `${user.score} | ${opponent.score}`;
            } else {
                scoreBoard.innerHTML = `${opponent.score} | ${user.score}`;
            }
        }

        function resetBall() {
            ball.x = 400; ball.y = 200; ball.vX = -ball.vX;
        }

        function render() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, 800, 400);

            ctx.fillStyle = "#ffffff22";
            ctx.fillRect(399, 0, 2, 400);

            // Dessin des raquettes selon le rôle
            ctx.fillStyle = "#5865F2"; // Bleu pour soi
            let userX = (myRole === 'left') ? 10 : 780;
            ctx.fillRect(userX, user.y, 10, 80);

            ctx.fillStyle = "#ED4245"; // Rouge pour l'autre
            let opponentX = (myRole === 'left') ? 780 : 10;
            ctx.fillRect(opponentX, opponent.y, 10, 80);

            // Balle
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fill();
        }

        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
