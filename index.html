<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discord Pong Multiplayer</title>
    <script src="socket.io.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #5865F2; background: #000; border-radius: 8px; display: none; }
        #status { font-size: 20px; color: #faa61a; margin-bottom: 10px; }
        #scoreBoard { display: none; font-size: 48px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="status">Initialisation...</div>
    <div id="scoreBoard">0 | 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const socket = io({ 
            path: '/mon-serveur/socket.io',
            transports: ['websocket'] 
        });

        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const scoreBoard = document.getElementById("scoreBoard");

        let myRole = null;
        let user = { y: 160, score: 0 };
        let opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, vX: 5, vY: 5 };
        let gameActive = false;

        socket.on('connect', () => {
            statusDiv.innerText = "Connecté au Proxy ! Recherche d'adversaire...";
        });

        socket.on('role', (role) => {
            myRole = role;
            statusDiv.style.display = "none";
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            gameActive = true;
            loop();
        });

        // RECEPTION : On met à jour la raquette adverse
        socket.on('opponentMove', (y) => { 
            opponent.y = y; 
        });

        // RECEPTION : Le joueur 2 (right) reçoit tout du joueur 1 (left)
        socket.on('ballUpdate', (data) => {
            if(myRole === 'right') {
                ball.x = data.x;
                ball.y = data.y;
                user.score = data.scoreRight;
                opponent.score = data.scoreLeft;
            }
        });

        canvas.addEventListener("mousemove", e => {
            if(!gameActive) return;
            let rect = canvas.getBoundingClientRect();
            let mouseY = e.clientY - rect.top - 40;
            user.y = mouseY;
            socket.emit('move', user.y);
        });

        function update() {
            if (myRole === 'left') {
                ball.x += ball.vX;
                ball.y += ball.vY;

                // Rebond murs
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;

                // Collision raquette GAUCHE (Moi si je suis left)
                if(ball.x < 30 && ball.x > 10 && ball.y > user.y - 5 && ball.y < user.y + 85) {
                    ball.vX = Math.abs(ball.vX) * 1.05;
                    ball.x = 30; // Anti-blocage
                }
                
                // Collision raquette DROITE (L'autre)
                if(ball.x > 760 && ball.x < 785 && ball.y > opponent.y - 5 && ball.y < opponent.y + 85) {
                    ball.vX = -Math.abs(ball.vX) * 1.05;
                    ball.x = 760; // Anti-blocage
                }

                // Points
                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }

                // Synchro vers le joueur 2
                socket.emit('ballSync', {
                    x: ball.x,
                    y: ball.y,
                    scoreLeft: user.score,
                    scoreRight: opponent.score
                });
            }
            scoreBoard.innerText = (myRole === 'left') ? `${user.score} | ${opponent.score}` : `${opponent.score} | ${user.score}`;
        }

        function resetBall() {
            ball.x = 400; ball.y = 200;
            ball.vX = (Math.random() > 0.5 ? 5 : -5);
            ball.vY = (Math.random() > 0.5 ? 4 : -4);
        }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#ffffff11"; ctx.fillRect(399, 0, 2, 400);
            
            // Raquette locale (Bleu Discord)
            ctx.fillStyle = "#5865F2";
            ctx.fillRect((myRole === 'left' ? 10 : 780), user.y, 10, 80);
            
            // Raquette distante (Rouge)
            ctx.fillStyle = "#ED4245";
            ctx.fillRect((myRole === 'left' ? 780 : 10), opponent.y, 10, 80);
            
            // Balle
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        }

        function loop() {
            if(!gameActive) return;
            update();
            render();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
