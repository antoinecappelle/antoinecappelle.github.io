<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pong Debug Multi-PC</title>
    <script src="socket.io.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #5865F2; background: #000; display: none; }
        #debug { position: fixed; top: 10px; left: 10px; font-family: monospace; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; color: #43b581; }
        #status { font-size: 24px; color: #faa61a; }
    </style>
</head>
<body>
    <div id="debug">
        Socket: <span id="s-conn">Déconnecté</span><br>
        Mon Rôle: <span id="s-role">?</span><br>
        Données reçues: <span id="s-data">0</span>
    </div>
    <div id="status">Initialisation...</div>
    <div id="scoreBoard" style="display:none; font-size: 40px; margin-bottom: 10px;">0 | 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const socket = io({ path: '/mon-serveur/socket.io', transports: ['websocket'] });
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        let myRole = null;
        let user = { y: 160, score: 0 };
        let opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, vX: 5, vY: 5 };
        let gameActive = false;
        let dataCount = 0;

        socket.on('connect', () => { document.getElementById("s-conn").innerText = "OK"; document.getElementById("status").innerText = "Attente d'adversaire..."; });

        socket.on('role', (role) => { myRole = role; document.getElementById("s-role").innerText = role; });

        socket.on('playerJoined', () => {
            document.getElementById("status").style.display = "none";
            document.getElementById("scoreBoard").style.display = "block";
            canvas.style.display = "block";
            gameActive = true;
            loop();
        });

        // RÉCEPTION DES DONNÉES DE L'ADVERSAIRE
        socket.on('opponentMove', (y) => {
            opponent.y = y;
            dataCount++;
            document.getElementById("s-data").innerText = dataCount;
        });

        socket.on('ballUpdate', (data) => {
            if(myRole === 'right') {
                ball.x = data.x;
                ball.y = data.y;
                user.score = data.scoreRight;
                opponent.score = data.scoreLeft;
                dataCount++;
                document.getElementById("s-data").innerText = dataCount;
            }
        });

        canvas.addEventListener("mousemove", e => {
            if(!gameActive) return;
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - 40;
            socket.emit('move', user.y);
        });

        function update() {
            if (myRole === 'left' && gameActive) {
                ball.x += ball.vX; ball.y += ball.vY;
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;
                if(ball.x < 30 && ball.x > 10 && ball.y > user.y - 5 && ball.y < user.y + 85) { ball.vX = Math.abs(ball.vX) * 1.05; ball.x = 31; }
                if(ball.x > 760 && ball.x < 785 && ball.y > opponent.y - 5 && ball.y < opponent.y + 85) { ball.vX = -Math.abs(ball.vX) * 1.05; ball.x = 759; }
                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }
                socket.emit('ballSync', { x: ball.x, y: ball.y, scoreLeft: user.score, scoreRight: opponent.score });
            }
            document.getElementById("scoreBoard").innerText = (myRole === 'left') ? `${user.score} | ${opponent.score}` : `${opponent.score} | ${user.score}`;
        }

        function resetBall() { ball.x = 400; ball.y = 200; ball.vX = (Math.random() > 0.5 ? 5 : -5); ball.vY = (Math.random() > 0.5 ? 4 : -4); }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#ffffff11"; ctx.fillRect(399, 0, 2, 400);
            ctx.fillStyle = "#5865F2"; ctx.fillRect((myRole === 'left' ? 10 : 780), user.y, 10, 80);
            ctx.fillStyle = "#ED4245"; ctx.fillRect((myRole === 'left' ? 780 : 10), opponent.y, 10, 80);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        }

        function loop() { if(!gameActive) return; update(); render(); requestAnimationFrame(loop); }
    </script>
</body>
</html>
