<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Pong Multiplayer</title>
    <script src="socket.io.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #5865F2; background: #000; border-radius: 8px; display: none; cursor: none; }
        #status { font-size: 20px; text-align: center; color: #faa61a; margin-bottom: 10px; }
        #scoreBoard { display: none; font-size: 48px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="status">Connexion au serveur...</div>
    <div id="scoreBoard">0 | 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        // Configuration de la connexion via le proxy Discord
        const socket = io({ 
            path: '/mon-serveur/socket.io',
            transports: ['websocket'] 
        });

        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const scoreBoard = document.getElementById("scoreBoard");

        let myRole = null;
        let user = { y: 160, score: 0 };
        let opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, radius: 8, vX: 5, vY: 5 };
        let gameActive = false;

        socket.on('connect', () => {
            statusDiv.innerText = "Connecté ! Recherche d'un adversaire...";
        });

        socket.on('role', (role) => {
            myRole = role;
            statusDiv.style.display = "none";
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            gameActive = true;
            loop();
        });

        socket.on('error', (msg) => {
            gameActive = false;
            statusDiv.style.display = "block";
            statusDiv.innerText = msg;
            statusDiv.style.color = "#f04747";
            canvas.style.display = "none";
        });

        socket.on('opponentMove', (y) => { opponent.y = y; });
        socket.on('ballUpdate', (data) => { if(myRole === 'right') ball = data; });

        canvas.addEventListener("mousemove", e => {
            if(!gameActive) return;
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - 40;
            socket.emit('move', user.y);
        });

        function update() {
            if (myRole === 'left') {
                ball.x += ball.vX; ball.y += ball.vY;
                // Rebond murs
                if(ball.y < 0 || ball.y > 400) ball.vY = -ball.vY;
                // Rebond raquettes
                if(ball.x < 25 && ball.y > user.y && ball.y < user.y + 80) ball.vX = Math.abs(ball.vX) * 1.05;
                if(ball.x > 775 && ball.y > opponent.y && ball.y < opponent.y + 80) ball.vX = -Math.abs(ball.vX) * 1.05;
                // Scores
                if (ball.x < 0) { opponent.score++; resetBall(); }
                if (ball.x > 800) { user.score++; resetBall(); }
                socket.emit('ballSync', ball);
            }
            scoreBoard.innerText = (myRole === 'left') ? `${user.score} | ${opponent.score}` : `${opponent.score} | ${user.score}`;
        }

        function resetBall() {
            ball.x = 400; ball.y = 200;
            ball.vX = (Math.random() > 0.5 ? 5 : -5);
            ball.vY = (Math.random() > 0.5 ? 5 : -5);
        }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#ffffff22"; ctx.fillRect(399, 0, 2, 400);
            
            // Dessin raquettes
            ctx.fillStyle = "#5865F2"; // Joueur Local
            ctx.fillRect((myRole === 'left' ? 10 : 780), user.y, 10, 80);
            
            ctx.fillStyle = "#ED4245"; // Adversaire
            ctx.fillRect((myRole === 'left' ? 780 : 10), opponent.y, 10, 80);
            
            // Dessin balle
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fill();
        }

        function loop() {
            if(!gameActive) return;
            update();
            render();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
