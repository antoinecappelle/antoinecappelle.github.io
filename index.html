<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discord Pong Fix</title>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #menu { text-align: center; background: #2f3136; padding: 40px; border-radius: 15px; z-index: 100; }
        button { display: block; width: 220px; padding: 15px; margin: 12px auto; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #5865F2; color: white; }
        
        /* Caché par défaut via CSS */
        #pong, #scoreBoard { display: none; }
        
        canvas { border: 4px solid #5865F2; background: #000; }
        #scoreBoard { font-size: 48px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>PONG</h1>
        <button onclick="startGame(0.06)">FACILE</button>
        <button onclick="startGame(0.12)">NORMAL</button>
        <button onclick="startGame(0.25)">LÉGENDE</button>
    </div>

    <div id="scoreBoard">00 | 00</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("menu");
        const scoreBoard = document.getElementById("scoreBoard");

        let aiLevel = 0.12;
        let gameRunning = false;
        let user = { x: 10, y: 160, score: 0 };
        let com = { x: 780, y: 160, score: 0 };
        let ball = { x: 400, y: 200, radius: 8, speed: 7, vX: 5, vY: 5 };

        function startGame(level) {
            aiLevel = level;
            // On force l'affichage/disparition
            menu.style.setProperty("display", "none", "important");
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            
            gameRunning = true;
            animate();
        }

        canvas.addEventListener("mousemove", e => {
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - 40;
        });

        function resetBall() {
            ball.x = 400; ball.y = 200; ball.speed = 7; ball.vX = -ball.vX;
        }

        function update() {
            ball.x += ball.vX; ball.y += ball.vY;
            com.y += (ball.y - (com.y + 40)) * aiLevel;
            if(ball.y + 8 > 400 || ball.y - 8 < 0) ball.vY = -ball.vY;

            let player = (ball.x < 400) ? user : com;
            if(ball.x + 8 > player.x && ball.x - 8 < player.x + 10 && ball.y > player.y && ball.y < player.y + 80) {
                ball.vX = -ball.vX;
                ball.speed += 0.5;
            }

            if(ball.x < 0) { com.score++; resetBall(); }
            else if(ball.x > 800) { user.score++; resetBall(); }
            scoreBoard.innerHTML = `${user.score} | ${com.score}`;
        }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#5865F2"; ctx.fillRect(user.x, user.y, 10, 80);
            ctx.fillStyle = "#ED4245"; ctx.fillRect(com.x, com.y, 10, 80);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        }

        function animate() {
            if(!gameRunning) return;
            update();
            render();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
