<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>fourmi's Pong</title>
    <script src="socket.io.js"></script>
    <style>
        body { margin: 0; background: #23272a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .ui-layer { text-align: center; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        h1 { font-size: 50px; color: #5865F2; margin-bottom: 20px; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 5px; background: #5865F2; color: white; min-width: 250px; }
        button:hover { background: #4752c4; }
        .btn-easy { background: #43b581; }
        .btn-hard { background: #f04747; }
        canvas { border: 4px solid #5865F2; background: #000; border-radius: 8px; display: none; }
        #status { font-size: 20px; color: #faa61a; margin-top: 20px; display: none; }
        #scoreBoard { display: none; font-size: 48px; margin-bottom: 10px; font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="mainMenu" class="ui-layer">
        <h1>PONG MULTI</h1>
        <button id="btnSolo">MODE SOLO</button>
        <button id="btnMulti">MULTIJOUEUR</button>
    </div>

    <div id="difficultyMenu" class="ui-layer hidden">
        <h1>DIFFICULTÉ</h1>
        <button id="btnEasy" class="btn-easy">FACILE</button>
        <button id="btnNormal">NORMAL</button>
        <button id="btnHard" class="btn-hard">EXPERT</button>
        <button id="btnBack" style="background:gray;">RETOUR</button>
    </div>

    <div id="status">Initialisation...</div>
    <div id="scoreBoard">0 | 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        // Récupération des éléments
        const mainMenu = document.getElementById("mainMenu");
        const diffMenu = document.getElementById("difficultyMenu");
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const scoreBoard = document.getElementById("scoreBoard");

        // Variables de jeu
        let socket, mode, myRole = 'left', gameActive = false;
        let user = { y: 160, score: 0 }, opponent = { y: 160, score: 0 };
        let ball = { x: 400, y: 200, vX: 5, vY: 5 }, cpuSpeed = 0.08;

        // --- GESTIONNAIRES D'ÉVÉNEMENTS (Remplacent les onclick) ---
        document.getElementById("btnSolo").addEventListener("click", () => {
            mainMenu.classList.add("hidden");
            diffMenu.classList.remove("hidden");
        });

        document.getElementById("btnBack").addEventListener("click", () => {
            diffMenu.classList.add("hidden");
            mainMenu.classList.remove("hidden");
        });

        document.getElementById("btnEasy").addEventListener("click", () => startSolo(0.04));
        document.getElementById("btnNormal").addEventListener("click", () => startSolo(0.08));
        document.getElementById("btnHard").addEventListener("click", () => startSolo(0.14));
        document.getElementById("btnMulti").addEventListener("click", startMulti);

        // --- FONCTIONS DE LANCEMENT ---
        function startSolo(diff) {
            mode = 'solo'; cpuSpeed = diff;
            diffMenu.classList.add("hidden");
            startGameUI();
        }

        function startMulti() {
            mode = 'multi';
            mainMenu.classList.add("hidden");
            statusDiv.style.display = "block";
            statusDiv.innerText = "Connexion...";

            socket = io({ path: '/mon-serveur/socket.io', transports: ['websocket'] });

            socket.on('role', (role) => {
                myRole = role;
                statusDiv.innerText = "Recherche d'adversaire...";
            });

            socket.on('playerJoined', () => {
                statusDiv.style.display = "none";
                startGameUI();
            });

            socket.on('opponentMove', (y) => { opponent.y = y; });
            socket.on('ballUpdate', (data) => {
                if(myRole === 'right') {
                    ball.x = data.x; ball.y = data.y;
                    user.score = data.scoreRight; opponent.score = data.scoreLeft;
                }
            });
            socket.on('opponentLeft', () => location.reload());
        }

        function startGameUI() {
            canvas.style.display = "block";
            scoreBoard.style.display = "block";
            gameActive = true;
            loop();
        }

        // --- PHYSIQUE & RENDU ---
        canvas.addEventListener("mousemove", e => {
            if(!gameActive) return;
            user.y = e.clientY - canvas.getBoundingClientRect().top - 40;
            if(mode === 'multi') socket.emit('move', user.y);
        });

        function update() {
            if (mode === 'solo') {
                ball.x += ball.vX; ball.y += ball.vY;
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;
                opponent.y += (ball.y - 40 - opponent.y) * cpuSpeed;
                checkCollisions();
            } else if (mode === 'multi' && myRole === 'left') {
                ball.x += ball.vX; ball.y += ball.vY;
                if(ball.y < 0 || ball.y > 392) ball.vY = -ball.vY;
                checkCollisions();
                socket.emit('ballSync', { x: ball.x, y: ball.y, scoreLeft: user.score, scoreRight: opponent.score });
            }
            scoreBoard.innerText = (myRole === 'left') ? `${user.score} | ${opponent.score}` : `${opponent.score} | ${user.score}`;
        }

        function checkCollisions() {
            if(ball.x < 30 && ball.x > 10 && ball.y > user.y - 5 && ball.y < user.y + 85) ball.vX = Math.abs(ball.vX) * 1.05;
            if(ball.x > 760 && ball.x < 785 && ball.y > opponent.y - 5 && ball.y < opponent.y + 85) ball.vX = -Math.abs(ball.vX) * 1.05;
            if (ball.x < 0) { opponent.score++; resetBall(); }
            if (ball.x > 800) { user.score++; resetBall(); }
        }

        function resetBall() {
            ball.x = 400; ball.y = 200;
            ball.vX = (Math.random() > 0.5 ? 5 : -5); ball.vY = 4;
        }

        function render() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#ffffff11"; ctx.fillRect(399, 0, 2, 400);
            ctx.fillStyle = "#5865F2"; ctx.fillRect((myRole === 'left' ? 10 : 780), user.y, 10, 80);
            ctx.fillStyle = "#ED4245"; ctx.fillRect((myRole === 'left' ? 780 : 10), opponent.y, 10, 80);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        }

        function loop() { if(gameActive) { update(); render(); requestAnimationFrame(loop); } }
    </script>
</body>
</html>
